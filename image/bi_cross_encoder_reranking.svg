<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
  <title id="title">Bi-Encoder 검색과 Cross-Encoder Reranking 비교</title>
  <desc id="desc">Bi-encoder는 질문과 문서를 따로 임베딩해 빠르게 후보를 모으고, cross-encoder는 질문과 문서를 한 쌍으로 다시 읽어 후보 순서를 재정렬한다.</desc>
  <defs>
    <style>
      .bg { fill:#f8fafc; }
      .title { font:700 26px "Pretendard","Noto Sans KR",Arial,sans-serif; fill:#111827; }
      .h { font:700 18px "Pretendard","Noto Sans KR",Arial,sans-serif; fill:#111827; }
      .body { font:500 13px "Pretendard","Noto Sans KR",Arial,sans-serif; fill:#334155; }
      .small { font:500 12px "Pretendard","Noto Sans KR",Arial,sans-serif; fill:#64748b; }
      .card { fill:#ffffff; stroke:#cbd5e1; stroke-width:1.5; rx:8; }
      .query { fill:#eef2ff; stroke:#818cf8; stroke-width:1.3; rx:6; }
      .doc { fill:#ecfdf5; stroke:#34d399; stroke-width:1.3; rx:6; }
      .vec { fill:#ecfeff; stroke:#06b6d4; stroke-width:1.3; rx:6; }
      .rank { fill:#fff7ed; stroke:#fb923c; stroke-width:1.3; rx:6; }
      .score { fill:#fff1f2; stroke:#fb7185; stroke-width:1.3; rx:6; }
      .line { stroke:#64748b; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#94a3b8; stroke-width:2; stroke-dasharray:6 5; fill:none; marker-end:url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="470"/>
  <text x="490" y="42" text-anchor="middle" class="title">Bi-Encoder로 후보를 모으고, Cross-Encoder로 순서를 다시 매긴다</text>

  <rect x="45" y="85" width="420" height="310" class="card"/>
  <text x="255" y="122" text-anchor="middle" class="h">1단계: Bi-Encoder Retrieval</text>
  <text x="255" y="147" text-anchor="middle" class="small">질문과 문서를 따로 벡터화하므로 빠르게 Top-K 후보를 찾을 수 있습니다.</text>

  <rect x="80" y="185" width="120" height="44" class="query"/>
  <text x="140" y="211" text-anchor="middle" class="body">질문</text>
  <rect x="80" y="265" width="120" height="44" class="doc"/>
  <text x="140" y="291" text-anchor="middle" class="body">문서 청크들</text>
  <path class="line" d="M205 207 L285 207"/>
  <path class="line" d="M205 287 L285 287"/>
  <rect x="290" y="185" width="115" height="44" class="vec"/>
  <text x="348" y="211" text-anchor="middle" class="body">질문 벡터</text>
  <rect x="290" y="265" width="115" height="44" class="vec"/>
  <text x="348" y="291" text-anchor="middle" class="body">문서 벡터</text>
  <path class="line" d="M348 232 L348 260"/>
  <rect x="190" y="340" width="130" height="36" class="rank"/>
  <text x="255" y="363" text-anchor="middle" class="body">Top-K 후보 수집</text>
  <path class="line" d="M348 310 C340 335, 315 348, 325 358"/>

  <path class="line" d="M470 240 L535 240"/>

  <rect x="540" y="85" width="395" height="310" class="card"/>
  <text x="738" y="122" text-anchor="middle" class="h">2단계: Cross-Encoder Reranking</text>
  <text x="738" y="147" text-anchor="middle" class="small">질문과 후보 문서를 한 쌍으로 함께 읽어 더 정밀하게 점수화합니다.</text>

  <rect x="575" y="185" width="125" height="44" class="query"/>
  <text x="638" y="211" text-anchor="middle" class="body">질문</text>
  <rect x="575" y="265" width="125" height="44" class="doc"/>
  <text x="638" y="291" text-anchor="middle" class="body">후보 문서 1</text>
  <path class="dash" d="M638 232 L638 260"/>
  <rect x="730" y="218" width="120" height="60" class="score"/>
  <text x="790" y="243" text-anchor="middle" class="body">pair score</text>
  <text x="790" y="263" text-anchor="middle" class="small">질문+문서 동시 입력</text>
  <path class="line" d="M705 287 L725 260"/>
  <path class="line" d="M705 207 L725 235"/>
  <path class="line" d="M855 248 L895 248"/>
  <rect x="870" y="320" width="45" height="36" class="rank"/>
  <text x="893" y="343" text-anchor="middle" class="body">1</text>
  <rect x="820" y="320" width="45" height="36" class="rank"/>
  <text x="843" y="343" text-anchor="middle" class="body">2</text>
  <rect x="770" y="320" width="45" height="36" class="rank"/>
  <text x="793" y="343" text-anchor="middle" class="body">3</text>
  <path class="line" d="M790 282 C805 306, 846 306, 870 320"/>
  <text x="738" y="425" text-anchor="middle" class="small">전체 문서에 직접 쓰기보다, Bi-Encoder가 모은 후보 몇 개에만 적용합니다.</text>
</svg>
